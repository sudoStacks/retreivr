name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  IMAGE_REPO: retreivr
  DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/retreivr

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize GHCR image name
        id: image_name
        shell: bash
        run: |
          set -euo pipefail
          OWNER_LC="${GITHUB_REPOSITORY_OWNER,,}"
          echo "value=ghcr.io/${OWNER_LC}/${IMAGE_REPO}" >> "${GITHUB_OUTPUT}"

      - name: Determine release mode
        id: release_mode
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if [[ "${TAG}" == *-* ]]; then
            echo "is_prerelease=true" >> "${GITHUB_OUTPUT}"
          else
            echo "is_prerelease=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ steps.image_name.outputs.value }}
            ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ steps.release_mode.outputs.is_prerelease == 'false' }}

      - name: Build and push Docker images
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            RETREIVR_VERSION=${{ github.ref_name }}

      - name: Generate Docker starter bundle
        shell: bash
        run: |
          set -euo pipefail

          BUNDLE_DIR="docker-starter"
          rm -rf "${BUNDLE_DIR}"
          mkdir -p "${BUNDLE_DIR}/config"

          if [[ -f "docker/docker-compose.yml.example" ]]; then
            cp "docker/docker-compose.yml.example" "${BUNDLE_DIR}/docker-compose.yml"
          elif [[ -f "docker-compose.yml" ]]; then
            cp "docker-compose.yml" "${BUNDLE_DIR}/docker-compose.yml"
          elif [[ -f "docker/compose.yml" ]]; then
            cp "docker/compose.yml" "${BUNDLE_DIR}/docker-compose.yml"
          else
            echo "No compose source file found." >&2
            exit 1
          fi

          if [[ -f ".env.example" ]]; then
            cp ".env.example" "${BUNDLE_DIR}/.env.example"
          fi

          if [[ -f "config/config.json.example" ]]; then
            cp "config/config.json.example" "${BUNDLE_DIR}/config/config.json.example"
          elif [[ -f "config/config_sample.json" ]]; then
            cp "config/config_sample.json" "${BUNDLE_DIR}/config/config.json.example"
          else
            echo "No config example file found." >&2
            exit 1
          fi

          if [[ -f "config/custom_search_adapters.example.yaml" ]]; then
            cp "config/custom_search_adapters.example.yaml" "${BUNDLE_DIR}/config/custom_search_adapters.example.yaml"
          fi

          cp "README-runtime.md" "${BUNDLE_DIR}/README-runtime.md"

      - name: Create Docker starter zip
        shell: bash
        run: |
          set -euo pipefail
          ZIP_NAME="retreivr-docker-starter-${{ github.ref_name }}.zip"
          rm -f "${ZIP_NAME}"
          (cd docker-starter && zip -rq "../${ZIP_NAME}" .)

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          prerelease: ${{ steps.release_mode.outputs.is_prerelease }}
          generate_release_notes: true
          files: |
            retreivr-docker-starter-${{ github.ref_name }}.zip
