<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">Retreivr architecture flow</title>
  <desc id="desc">A left-to-right diagram showing inputs flowing through resolver, queue, workers, metadata, review, and export stages into library and operator surfaces.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f6f1e8"/>
      <stop offset="100%" stop-color="#e9eef4"/>
    </linearGradient>
    <linearGradient id="core" x1="0" x2="1">
      <stop offset="0%" stop-color="#1d4d4f"/>
      <stop offset="100%" stop-color="#2e6f73"/>
    </linearGradient>
    <linearGradient id="out" x1="0" x2="1">
      <stop offset="0%" stop-color="#8a5a44"/>
      <stop offset="100%" stop-color="#b07d62"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#16303a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#2f4858"/>
    </marker>
    <style>
      .title { font: 700 42px Georgia, serif; fill: #17303b; }
      .subtitle { font: 500 19px Georgia, serif; fill: #49606d; }
      .label { font: 700 24px Georgia, serif; fill: #fff; }
      .small { font: 500 18px Georgia, serif; fill: #edf5f7; }
      .ink { font: 700 24px Georgia, serif; fill: #17303b; }
      .body { font: 500 18px Georgia, serif; fill: #3f5561; }
      .cap { font: 700 20px Georgia, serif; fill: #7a4f3b; }
      .line { stroke: #2f4858; stroke-width: 6; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #5f7987; stroke-width: 4; stroke-dasharray: 10 12; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1400" height="820" fill="url(#bg)"/>
  <text x="78" y="88" class="title">Retreivr Acquisition Flow</text>
  <text x="78" y="124" class="subtitle">Deterministic intake, queueing, metadata authority, review, export, and operator visibility.</text>

  <g filter="url(#shadow)">
    <rect x="78" y="182" rx="26" ry="26" width="250" height="408" fill="#fdfbf7"/>
    <text x="108" y="228" class="ink">Inputs</text>
    <text x="108" y="278" class="body">URL</text>
    <text x="108" y="328" class="body">Search</text>
    <text x="108" y="378" class="body">Playlist / Watcher</text>
    <text x="108" y="428" class="body">Spotify Sync</text>
    <text x="108" y="478" class="body">Apple Music XML</text>
    <text x="108" y="528" class="body">Library Import</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="392" y="182" rx="30" ry="30" width="360" height="408" fill="url(#core)"/>
    <text x="424" y="228" class="label">Core Pipeline</text>
    <text x="424" y="282" class="small">Resolve</text>
    <text x="424" y="324" class="small">MusicBrainz authority</text>
    <text x="424" y="382" class="small">Queue</text>
    <text x="424" y="424" class="small">dedupe, retries, recovery</text>
    <text x="424" y="482" class="small">Workers</text>
    <text x="424" y="524" class="small">yt-dlp, ffmpeg, tagging</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="816" y="182" rx="26" ry="26" width="250" height="184" fill="#fdfbf7"/>
    <text x="846" y="228" class="ink">Quality Gates</text>
    <text x="846" y="278" class="body">Metadata validation</text>
    <text x="846" y="318" class="body">Review queue</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="816" y="406" rx="26" ry="26" width="250" height="184" fill="#fdfbf7"/>
    <text x="846" y="452" class="ink">Finalization</text>
    <text x="846" y="502" class="body">Canonical library</text>
    <text x="846" y="542" class="body">Music export targets</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1130" y="182" rx="30" ry="30" width="194" height="408" fill="url(#out)"/>
    <text x="1162" y="228" class="label">Outputs</text>
    <text x="1162" y="282" class="small">Library</text>
    <text x="1162" y="332" class="small">Apple Music</text>
    <text x="1162" y="382" class="small">Plex / Jellyfin</text>
    <text x="1162" y="432" class="small">Navidrome</text>
    <text x="1162" y="482" class="small">Status UI</text>
    <text x="1162" y="532" class="small">API / Run summaries</text>
  </g>

  <path d="M328 388 H372" class="line"/>
  <path d="M752 388 H796" class="line"/>
  <path d="M941 366 V394" class="line"/>
  <path d="M1066 500 H1110" class="line"/>
  <path d="M1066 274 H1110" class="line"/>

  <path d="M690 590 C740 664, 860 700, 1130 700" class="dash"/>
  <text x="724" y="676" class="cap">Operator visibility and deterministic summaries</text>
</svg>
